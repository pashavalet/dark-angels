services:
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports: ['3000:3000']
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports: ['80:80']
    depends_on: [backend]
    restart: unless-stopped
